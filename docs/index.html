<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог растений - Сад</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">Каталог растений сада Эмсотех</h1>
                    <p class="text-gray-600">База данных растений в саду с поиском по названию</p>
                </div>
                <button id="about-btn" class="mt-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors whitespace-nowrap">
                    О саде
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Search Section -->
            <div class="bg-white rounded-lg shadow p-6 mb-8">
                <div class="flex flex-col gap-4">
                    <!-- Search Input -->
                    <div>
                        <label for="search" class="block text-sm font-medium text-gray-700 mb-2">
                            Поиск растения
                        </label>
                        <input
                            type="text"
                            id="search"
                            placeholder="Введите название (русское или латинское)..."
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                        />
                    </div>

                    <!-- Filter Options -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <!-- Zone Filter -->
                        <div>
                            <label for="zone-filter" class="block text-sm font-medium text-gray-700 mb-2">
                                Зона зимостойкости
                            </label>
                            <select
                                id="zone-filter"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                            >
                                <option value="">Все зоны</option>
                            </select>
                        </div>

                        <!-- Conditions Filter -->
                        <div>
                            <label for="conditions-filter" class="block text-sm font-medium text-gray-700 mb-2">
                                Условия произрастания
                            </label>
                            <select
                                id="conditions-filter"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                            >
                                <option value="">Все условия</option>
                            </select>
                        </div>

                        <!-- Results Counter -->
                        <div class="flex items-end">
                            <div class="text-sm text-gray-600">
                                <span id="results-count">612</span> из 612 растений
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Plants Grid -->
            <div id="plants-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Cards will be inserted here by JavaScript -->
            </div>

            <!-- No Results Message -->
            <div id="no-results" class="text-center py-12 hidden">
                <p class="text-gray-500 text-lg">Растения не найдены</p>
                <p class="text-gray-400 mt-2">Попробуйте изменить критерии поиска</p>
            </div>
        </main>

        <!-- About Garden Modal -->
        <div id="about-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
            <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full mx-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold text-gray-900">О саде</h2>
                    <button id="close-modal" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
                </div>
                <div class="text-gray-700 text-lg">
                    <p>Сад создан по инициативе руководителя "Эмсотех" Сухоруковой Е.В</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/catalog.js"></script>
    <script src="js/search.js"></script>

    <!-- Modal Script -->
    <script>
        const aboutBtn = document.getElementById('about-btn');
        const aboutModal = document.getElementById('about-modal');
        const closeModal = document.getElementById('close-modal');

        // Open modal
        aboutBtn.addEventListener('click', () => {
            aboutModal.classList.remove('hidden');
        });

        // Close modal
        closeModal.addEventListener('click', () => {
            aboutModal.classList.add('hidden');
        });

        // Close modal when clicking outside
        aboutModal.addEventListener('click', (e) => {
            if (e.target === aboutModal) {
                aboutModal.classList.add('hidden');
            }
        });

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !aboutModal.classList.contains('hidden')) {
                aboutModal.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
